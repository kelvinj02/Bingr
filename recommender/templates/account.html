{%extends 'base.html' %}
{% block styles %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">{% endblock styles %}

{% block content %}

    <div class="container">
        <div class="account-header">
    <div class="account-avatar">{{ current_user.username[0].upper() }}</div>
    <h1 style="font-size:1.8rem;">{{ current_user.username }}</h1>
    <p style="color:var(--text3);font-size:0.875rem;">{{ current_user.email }}</p>
    
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num">{{ ratings|length }}</div>
        <div class="stat-label">Ratings</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">{{ comments|length }}</div>
        <div class="stat-label">Reviews</div>
      </div>
    </div>
</div>
</div>
{% endblock content %}
